<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WeBlog — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Raleway', sans-serif;
      background: #e8edf2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 16px;
    }

    .card {
      display: flex;
      width: 900px;
      min-height: 580px;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 6px 20px rgba(0,0,0,0.1);
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 40px;
      overflow: hidden;
    }
    .left::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(145deg, rgba(38,198,218,0.9) 0%, rgba(0,151,167,0.94) 100%);
      z-index: 1;
    }
    .left::after {
      content: '';
      position: absolute; inset: 0;
      background: #004d56;
      z-index: 0;
    }
    /* Decorative blurred shapes mimicking photo bg */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      z-index: 0;
    }
    .bg-shape.s1 { width:260px; height:260px; top:-60px; left:-60px; }
    .bg-shape.s2 { width:200px; height:200px; bottom:40px; right:-40px; }
    .bg-shape.s3 { width:140px; height:140px; bottom:100px; left:60px; }
    .bg-shape.s4 { width:80px; height:80px; top:120px; right:80px; }

    .left > * { position: relative; z-index: 2; }

    .brand {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
    }
    .brand-text {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .brand-icon {
      width: 26px; height: 26px;
      background: #fff;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 2px;
    }
    .brand-icon svg { width: 12px; height: 12px; margin-left: 2px; }

    .left-desc {
      color: rgba(255,255,255,0.88);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 44px;
      text-align: center;
    }

    .left-features {
      width: 100%;
      max-width: 230px;
      margin-bottom: 44px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .feature-dot {
      width: 8px; height: 8px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .left-btns {
      display: flex;
      flex-direction: column;
      gap: 13px;
      width: 100%;
      max-width: 220px;
    }
    .btn-outline {
      padding: 13px 20px;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 30px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Raleway', sans-serif;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
      text-decoration: none;
      display: block;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.2); border-color: #fff; }
    .btn-outline.active { background: rgba(255,255,255,0.25); border-color: #fff; }

    /* ── RIGHT PANEL ── */
    .right {
      width: 420px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 50px;
    }

    .brand-right {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
    }
    .brand-right .brand-text { font-size: 26px; color: #555; }
    .brand-right .brand-icon { width: 20px; height: 20px; background: #26c6da; }
    .brand-right .brand-icon svg { width: 10px; height: 10px; }

    .form-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 28px;
      text-align: center;
    }

    .form-wrap { width: 100%; }

    /* Two columns for name fields */
    .field-row-2 {
      display: flex;
      gap: 20px;
      margin-bottom: 0;
    }
    .field-row-2 .field { flex: 1; }

    .field {
      margin-bottom: 22px;
    }
    .field label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 9px;
    }
    .input-row {
      display: flex;
      align-items: center;
      border-bottom: 2px solid #e8e8e8;
      padding-bottom: 7px;
      transition: border-color 0.2s;
    }
    .input-row:focus-within { border-color: #26c6da; }
    .input-row svg {
      width: 16px; height: 16px;
      color: #26c6da;
      flex-shrink: 0;
      margin-right: 10px;
    }
    .input-row input {
      flex: 1;
      border: none; outline: none;
      font-size: 13px;
      font-family: 'Raleway', sans-serif;
      color: #333;
      background: transparent;
      padding: 2px 0;
    }
    .input-row input::placeholder { color: #d0d0d0; }

    /* Password strength bar */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .strength-bar span {
      flex: 1; height: 3px;
      background: #eee;
      border-radius: 2px;
      transition: background 0.3s;
    }

    /* Terms */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 22px;
    }
    .terms-row input[type=checkbox] {
      width: 14px; height: 14px;
      accent-color: #26c6da;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .terms-row label {
      font-size: 10px;
      color: #aaa;
      font-weight: 600;
      letter-spacing: 0.5px;
      line-height: 1.6;
      text-transform: uppercase;
      cursor: pointer;
    }
    .terms-row label a { color: #26c6da; text-decoration: none; }
    .terms-row label a:hover { text-decoration: underline; }

    /* Alert error */
    .alert-error {
      display: flex; align-items: center; gap: 8px;
      background: rgba(239,68,68,0.07);
      border: 1px solid rgba(239,68,68,0.2);
      color: #e05555; font-size: 11px;
      padding: 10px 12px; border-radius: 4px;
      margin-bottom: 18px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

    .btn-register {
      width: 100%;
      padding: 14px;
      background: #26c6da;
      border: none;
      border-radius: 30px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Raleway', sans-serif;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.25s;
    }
    .btn-register:hover {
      background: #00b8cc;
      box-shadow: 0 6px 20px rgba(38,198,218,0.4);
      transform: translateY(-1px);
    }
    .btn-register:active { transform: translateY(0); }

    .form-footer {
      text-align: center;
      font-size: 10px;
      color: #bbb;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .form-footer a { color: #26c6da; text-decoration: none; font-weight: 800; }
    .form-footer a:hover { text-decoration: underline; }

    @media (max-width: 720px) {
      .card { flex-direction: column; width: 100%; min-height: unset; border-radius: 0; }
      .left { min-height: 260px; }
      .right { width: 100%; padding: 36px 28px; }
      .field-row-2 { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- LEFT PANEL -->
    <div class="left">
      <div class="bg-shape s1"></div>
      <div class="bg-shape s2"></div>
      <div class="bg-shape s3"></div>
      <div class="bg-shape s4"></div>

      <div class="brand">
        <span class="brand-text">WEB</span>
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="#26c6da"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <span class="brand-text">G</span>
      </div>

      <p class="left-desc">Join us today!</p>

      <div class="left-features">
        <div class="feature-item"><div class="feature-dot"></div>Write & publish your stories</div>
        <div class="feature-item"><div class="feature-dot"></div>Connect with readers worldwide</div>
        <div class="feature-item"><div class="feature-dot"></div>Grow your personal brand</div>
        <div class="feature-item"><div class="feature-dot"></div>Free forever, no hidden fees</div>
      </div>

      <div class="left-btns">
        <a href="{% url 'user:login' %}" class="btn-outline">Login</a>
        <a href="#" class="btn-outline active">Sign Up</a>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
      <div class="brand-right">
        <span class="brand-text" style="color:#555">WEB</span>
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <span class="brand-text" style="color:#555">G</span>
      </div>

      <p class="form-title">Create your account</p>

      <form class="form-wrap" method="POST" action="{% url 'user:register' %}">

        {% if error %}
        <div class="alert-error">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ error }}
        </div>
        {% endif %}


        <!-- Name -->
        <div class="field-row-2">
          <div class="field">
            <label for="first_name">First Name</label>
            <div class="input-row">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
              </svg>
              <input type="text" name="first_name" id="first_name" placeholder="First name" autocomplete="given-name"/>
            </div>
          </div>
          <div class="field">
            <label for="last_name">Last Name</label>
            <div class="input-row">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
              </svg>
              <input type="text" name="last_name" id="last_name" placeholder="Last name" autocomplete="family-name"/>
            </div>
          </div>
        </div>

        <!-- Username -->
        <div class="field">
          <label for="username">Username</label>
          <div class="input-row">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
            </svg>
            <input type="text" name="name" id="username" placeholder="@yourusername" autocomplete="username"/>
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label for="email">Email Address</label>
          <div class="input-row">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
            </svg>
            <input type="email" name="email" id="email" placeholder="you@example.com" autocomplete="email"/>
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Password</label>
          <div class="input-row">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/>
            </svg>
            <input type="password" name="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          </div>
          <div class="strength-bar">
            <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="field">
          <label for="confirm">Confirm Password</label>
          <div class="input-row">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 8h-1V6c0-2.8-2.2-5-5-5S7 3.2 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.7 1.4-3.1 3.1-3.1 1.7 0 3.1 1.4 3.1 3.1v2z"/>
            </svg>
            <input type="password" name="confirm_password" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
          </div>
        </div>

        <!-- Terms -->
        <div class="terms-row">
          <input type="checkbox" id="terms"/>
          <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>

        <button type="submit" class="btn-register">Create Account</button>

        <p class="form-footer">Already have an account? <a href="{% url 'user:login' %}">Login</a></p>

      </form>
    </div>

  </div>

  <script>
    function checkStrength(val) {
      const bars = [document.getElementById('s1'), document.getElementById('s2'),
                    document.getElementById('s3'), document.getElementById('s4')];
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
      bars.forEach((b, i) => {
        b.style.background = i < score ? colors[score - 1] : '#eee';
      });
    }
  </script>
</body>
</html>
